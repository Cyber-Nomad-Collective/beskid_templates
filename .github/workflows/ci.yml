name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r ci/requirements.txt
      - run: python -m nox --non-interactive -s quality

  publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: Cyber-Nomad-Collective/beskid_compiler
          path: .ci/beskid_compiler
          fetch-depth: 1
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Beskid CLI (for future pack/publish)
        working-directory: .ci/beskid_compiler
        run: cargo build --release -p beskid_cli
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r ci/requirements.txt
      - name: Publish beskid_templates to pckg (stub)
        continue-on-error: true
        env:
          BESKID_CLI_BIN: ${{ github.workspace }}/.ci/beskid_compiler/target/release/beskid_cli
          BESKID_TEMPLATES_ROOT: ${{ github.workspace }}
          BESKID_PCKG_API_KEY: ${{ secrets.BESKID_PCKG_KEY }}
          BESKID_PCKG_BASE_URL: https://pckg.beskid-lang.org
        run: python -m nox --non-interactive -s publish_templates
